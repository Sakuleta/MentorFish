name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Lint (Frontend) ───────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  # ─── Test (Rust Backend) ───────────────────────────────────────
  test:
    name: Test (Rust)
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mentorfish
          POSTGRES_PASSWORD: mentorfish
          POSTGRES_DB: mentorfish_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Run Rust tests (unit only)
        run: cargo test --manifest-path src-tauri/Cargo.toml
        env:
          DATABASE_URL: postgres://mentorfish:mentorfish@localhost:5432/mentorfish_test

  # ─── Check (Rust Compilation) ──────────────────────────────────
  check:
    name: Rust Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Cargo check (fast, no codegen)
        run: cargo check --manifest-path src-tauri/Cargo.toml

  # ─── Build (Frontend) ──────────────────────────────────────────
  build:
    name: Build (Frontend)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
